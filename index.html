<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOUTH SIDE — DROP 001</title>

  <!-- Favicon correcto -->
  <link rel="icon" href="assets/logo.png" />
  <link rel="shortcut icon" type="image/x-icon" href="assets/logo.png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />

  <meta name="theme-color" content="#0e0e0e" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
</head>

<body>
  <header>
    <img src="assets/logo.png" alt="South Side logo" class="logo" />
    <nav>
      <ul>
        <li><a href="#shop">Tienda</a></li>
        <li><a href="cart.html">Carrito 🛒</a></li>
      </ul>
    </nav>
  </header>

  <section id="hero">
    <h1 data-aos="fade-up">SOUTH SIDE</h1>
    <p data-aos="fade-up" data-aos-delay="200">HECHO EN EL SUR</p>
  </section>

  <section id="shop" class="shop">
    <div class="product" data-aos="fade-right" data-id="grilzz-black" data-price="31900">
      <img src="assets/drop1-black.jpg" alt="South Side Black" />
      <h3>Grilzz Black</h3>
      <p>$31900 ARS</p>
      <select class="size-selector">
        <option value="">Seleccionar talle</option>
        <option value="M">M</option>
        <option value="L">L</option>
      </select>
      <button onclick="addToCart('grilzz-black', this)">Agregar al carrito</button>
    </div>

    <div class="product" data-aos="fade-left" data-id="art-is-dead-white" data-price="31900">
      <img src="assets/drop1-white.jpg" alt="Art Is Dead White" />
      <h3>Art Is Dead White</h3>
      <p>$31900 ARS</p>
      <select class="size-selector">
        <option value="">Seleccionar talle</option>
        <option value="M">M</option>
        <option value="L">L</option>
      </select>
      <button onclick="addToCart('art-is-dead-white', this)">Agregar al carrito</button>
    </div>
  </section>

  <footer>
    <p>© 2025 SOUTH SIDE — Hecho en el Sur.</p>
  </footer>

  <script src="script.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ duration: 800, once: true });</script>
  <script src="particles.js"></script>
  <script>
    if (typeof ParticleSystem !== 'undefined') {
      new ParticleSystem();
    }
  </script>
</body>
</html>
